name: Azure_Uplink_Deployment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the entire Monorepo (includes Deck, Identity, and Tests)
      - name: Checkout Monorepo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      # 2. Restore and Test Deck API
      - name: Restore & Test Deck API
        run: |
          dotnet restore YuGiOh_Deck_API/YuGiOhDeckApi.sln
          dotnet test YuGiOh_Deck_API.Tests/YuGiOh_Deck_API.Tests.csproj --verbosity normal

      # 3. Log in to Azure & ACR
      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Docker Login
        uses: azure/docker-login@v1
        with:
          login-server: yugiohapidocker.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 4. Build and Push BOTH Images
      - name: Build and Push Backend Images
        run: |
          # Build Deck API
          docker build -t yugiohapidocker.azurecr.io/api:${{ github.sha }} ./YuGiOh_Deck_API
          docker push yugiohapidocker.azurecr.io/api:${{ github.sha }}

          # Build Identity API
          docker build -t yugiohapidocker.azurecr.io/identity:${{ github.sha }} ./YuGiOhIdentityApi
          docker push yugiohapidocker.azurecr.io/identity:${{ github.sha }}

      # 5. Deploy Identity API (Direct Update)
      - name: Deploy Identity API
        uses: azure/container-apps-deploy-action@v1
        with:
          imageToDeploy: yugiohapidocker.azurecr.io/identity:${{ github.sha }}
          containerAppName: identity-api # Ensure this matches your Azure resource name
          resourceGroup: ErreGeTe
          targetPort: 8080

      # 6. Deploy Deck API (Blue-Green Logic)
      - name: Update Deck API (0% Traffic)
        id: deploy_step
        uses: azure/container-apps-deploy-action@v1
        with:
          imageToDeploy: yugiohapidocker.azurecr.io/api:${{ github.sha }}
          containerAppName: api
          resourceGroup: ErreGeTe
          targetPort: 8080
          revisionMode: Multiple

      - name: Run Smoke Test on Deck API
        run: |
          REVISION_NAME=$(az containerapp revision list \
            --name api \
            --resource-group ErreGeTe \
            --query "[0].name" -o tsv)

          REVISION_URL=$(az containerapp revision show \
            --name api \
            --resource-group ErreGeTe \
            --revision $REVISION_NAME \
            --query properties.fqdn -o tsv)

          echo "Testing new revision at: https://$REVISION_URL"

          # Ping the API to ensure hydration/user logic is alive
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$REVISION_URL/api/mongodb/DeckListMongoDb/user/447572")

          if [ "$STATUS" -ne 200 ]; then
            echo "Smoke test failed with status $STATUS!"
            exit 1
          fi

          echo "FINAL_REVISION=$REVISION_NAME" >> $GITHUB_ENV

      - name: Shift Deck API Traffic to 100%
        if: success()
        run: |
          az containerapp ingress traffic set \
            --name api \
            --resource-group ErreGeTe \
            --revision-weight ${{ env.FINAL_REVISION }}=100
